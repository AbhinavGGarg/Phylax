# PHYLAX Control — InsForge project configuration.
# Apply with:  npx @insforge/cli config apply
[auth]
allowed_redirect_urls = ["http://localhost:8890", "http://localhost:8890/console"]
require_email_verification = false
verify_email_method = "code"
reset_password_method = "code"
disable_signup = false

[auth.password]
min_length = 6
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[storage]
max_file_size_mb = 25

[realtime]
retention_days = 0

[schedules]
retention_days = 7

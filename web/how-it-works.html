<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Phylax · Protected match, visualized</title>
<link rel="stylesheet" href="/assets/phylax.css"/>
<style>
  /* The explainer is a light, public-facing surface; the operator console stays dark. */
  :root{
    --void:#f6f9fa;--deep:#ffffff;--slate:#eff5f6;--raised:#e7f0f2;
    --line:rgba(18,50,64,.14);--line-2:rgba(18,50,64,.28);
    --ink:#10242e;--dim:#516a76;--faint:#718791;
    --cyan:#07858b;--cyan-2:#056e75;--emerald:#168a67;--amber:#b66f13;--crimson:#c43d57;--iris:#5964cf;
    --glow-cyan:rgba(7,133,139,.24);--glow-crim:rgba(196,61,87,.20);
    --shadow:0 24px 60px -30px rgba(23,52,66,.22)
  }
  body.light-visualization{
    color:var(--ink);
    background:
      radial-gradient(900px 520px at 88% -8%,rgba(7,133,139,.12),transparent 62%),
      radial-gradient(740px 440px at 4% 108%,rgba(89,100,207,.08),transparent 60%),
      var(--void)
  }
  .light-visualization.grid-bg::before{
    opacity:.65;
    background-image:linear-gradient(rgba(18,50,64,.075) 1px,transparent 1px),linear-gradient(90deg,rgba(18,50,64,.075) 1px,transparent 1px)
  }
  .light-visualization .stage{background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(246,249,250,.72))}
  .light-visualization header.bar{
    padding:14px 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.72);backdrop-filter:blur(14px)
  }
  .light-visualization .nav{display:flex;gap:3px;flex-wrap:wrap}
  .light-visualization .nav a{color:var(--dim)}
  .light-visualization .nav a:hover,.light-visualization .nav a[aria-current="page"]{color:var(--ink);background:rgba(7,133,139,.09)}
  .light-visualization .canvas-wrap{
    margin:14px 22px 18px;border:1px solid var(--line);border-radius:16px;overflow:hidden;
    background:radial-gradient(520px 380px at 74% 52%,rgba(7,133,139,.075),transparent 70%),rgba(255,255,255,.74);
    box-shadow:var(--shadow)
  }
  .light-visualization .title{top:22px;left:22px}.light-visualization .title h1{color:var(--ink)}
  .light-visualization .readout{color:var(--dim)}.light-visualization .readout b{color:var(--ink)}
  .light-visualization .readout .m{color:var(--crimson)}.light-visualization .readout .z{color:var(--cyan)}
  .light-visualization .caption .line{color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.8)}
  .light-visualization .prog{background:rgba(18,50,64,.14)}
  .light-visualization .btn{background:rgba(255,255,255,.88);border-color:var(--line-2);color:var(--ink);box-shadow:0 8px 22px -16px rgba(23,52,66,.32)}
  .light-visualization .btn:hover{border-color:var(--cyan);color:var(--ink);background:#fff}

  html,body{height:100%;overflow:hidden}
  .stage{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
  header.bar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 22px;flex-shrink:0}
  .nav a{font-size:12.5px;color:var(--dim);padding:6px 10px;border-radius:8px}.nav a:hover{color:var(--ink);background:rgba(20,29,49,.6)}
  .canvas-wrap{flex:1;position:relative;min-height:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  .readout{position:absolute;top:14px;right:22px;display:flex;gap:18px;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.04em;pointer-events:none}
  .readout b{color:var(--ink);font-weight:500}.readout .m{color:var(--crimson)}.readout .z{color:var(--cyan)}
  .title{position:absolute;top:20px;left:22px;pointer-events:none}
  .title .eyebrow{margin-bottom:6px}
  .title h1{font-size:clamp(19px,2.4vw,28px);letter-spacing:-0.03em;line-height:1.06}
  .caption{position:absolute;left:0;right:0;bottom:66px;text-align:center;pointer-events:none;padding:0 20px}
  .caption .step{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--cyan);margin-bottom:8px;opacity:0;transition:opacity .5s}
  .caption .line{font-size:clamp(15px,2.1vw,22px);font-weight:540;letter-spacing:-0.02em;color:var(--ink);opacity:0;transform:translateY(6px);transition:opacity .6s,transform .6s;max-width:720px;margin:0 auto}
  .caption.show .step,.caption.show .line{opacity:1;transform:none}
  .prog{position:absolute;left:6%;right:6%;bottom:52px;height:2px;background:rgba(126,146,184,.16);border-radius:2px;overflow:hidden}
  .prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--iris));border-radius:2px}
  .controls{position:absolute;left:0;right:0;bottom:18px;display:flex;justify-content:center}
  @media(max-width:760px){header.bar{align-items:flex-start;flex-wrap:wrap;padding:12px 16px}.canvas-wrap{margin:10px 12px 14px;border-radius:12px}.readout{top:12px;right:12px}.title{display:none}.readout{gap:10px;font-size:10px}}
</style>
</head>
<body class="grid-bg light-visualization">
<div class="stage">
  <header class="bar">
    <div style="display:flex;align-items:center;gap:16px">
      <a class="wordmark" href="index.html"><span class="phi"></span>PHYLAX</a>
      <span class="eyebrow" style="border-left:1px solid var(--line);padding-left:14px">Protected match · visualized</span>
    </div>
    <nav class="nav" aria-label="Primary"><a href="index.html">Home</a><a href="console.html">Console</a><a href="architecture.html">Architecture</a><a href="partner.html">Partner</a><a href="sponsor.html">Sponsor</a></nav>
  </header>
  <div class="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="title"><div class="eyebrow">How the match works</div><h1>Prove the overlap.<br/>Reveal nothing else.</h1></div>
    <div class="readout">
      <span>GROUP <b>DDH · 2048-bit</b></span><span>ELEMENTS <b id="rEl">0</b></span>
      <span>MATCHED <b class="m" id="rMatch">0</b></span><span>LEAKED <b class="z">0</b></span>
    </div>
    <div class="prog"><i id="prog"></i></div>
    <div class="caption" id="cap"><div class="step" id="capStep"></div><div class="line" id="capLine"></div></div>
    <div class="controls"><button class="btn" id="replay"> Replay</button></div>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const C={faint:'#8aa0aa',dim:'#5c737e',ink:'#10242e',cyan:'#07858b',iris:'#5964cf',crimson:'#c43d57'};
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
const rnd=(a,b)=>a+Math.random()*(b-a), hex=n=>Array.from({length:n},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
const lerp=(a,b,t)=>a+(b-a)*t, clamp=(v,a,b)=>v<a?a:v>b?b:v, smooth=x=>{x=clamp(x,0,1);return x*x*(3-2*x);};
const mixc=(c1,c2,t)=>{const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];const a=p(c1),b=p(c2);return`rgb(${a.map((v,i)=>Math.round(lerp(v,b[i],t))).join(',')})`;};

const PARTY=[{n:'FINTRUST'},{n:'SWIFTCART'},{n:'PINGLINE'}];
let W=0,H=0,DPR=1,nodes=[],homes=[],mem=0,cipher={x:0,y:0},camp=[],campHex=[],CAMP_ID=hex(24);
const NOISE=6;
// timeline (seconds)
const TOK0=1.1,TOK1=3.3,B0=3.3,B1=8.2,M0=8.2,M1=12.4,SEAL=13.6,END=18.5;

function resize(){const r=cv.getBoundingClientRect();DPR=Math.min(2,devicePixelRatio||1);W=r.width;H=r.height;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);layout();}
addEventListener('resize',resize);
function layout(){
  mem=W*0.44; cipher={x:W*0.73,y:H*0.52};
  homes=[{x:W*0.14,y:H*0.30},{x:W*0.12,y:H*0.53},{x:W*0.14,y:H*0.76}];
  const R=Math.min(W,H)*0.17;
  camp=[0,1,2,3].map(i=>{const a=-Math.PI/2+i*Math.PI/2;return{x:cipher.x+Math.cos(a)*R,y:cipher.y+Math.sin(a)*R*0.82};});
  for(const n of nodes){
    const h=homes[n.party];
    n.hx=h.x+Math.cos(n.a)*n.rr; n.hy=h.y+Math.sin(n.a)*n.rr;
    n.sx=cipher.x-W*0.15+n.ox*36; n.sy=cipher.y+(n.hy-cipher.y)*0.34+n.oy*66;
    if(n.campaign){n.fx=camp[n.cid].x; n.fy=camp[n.cid].y;}
    else{n.fx=cipher.x+n.ox*W*0.17; n.fy=cipher.y+n.oy*H*0.31;}
  }
}
function mk(party,campaign,cid,h){return{party,campaign,cid,hexFinal:h,a:rnd(0,6.28),rr:rnd(6,campaign?24:34),ox:rnd(-1,1),oy:rnd(-1,1),seed:Math.random()*99,settle:rnd(.15,.85),size:campaign?5:3.3};}
function build(){nodes=[];campHex=[hex(6),hex(6),hex(6),hex(6)];for(let p=0;p<3;p++){for(let c=0;c<4;c++)nodes.push(mk(p,true,c,campHex[c]));for(let k=0;k<NOISE;k++)nodes.push(mk(p,false,-1,hex(6)));}CAMP_ID=hex(24);layout();}

// deterministic position at time t (no stateful lerp. any single frame is correct)
function pos(n,t,now){
  let x,y;
  if(t<=B0){x=n.hx;y=n.hy;}
  else if(t<=M0){const e=smooth((t-B0)/(M0-B0));x=lerp(n.hx,n.sx,e);y=lerp(n.hy,n.sy,e);}
  else{const e=smooth((t-M0)/(M1-M0));x=lerp(n.sx,n.fx,e);y=lerp(n.sy,n.fy,e);
       if(n.campaign&&t>M1-0.5){x+=Math.sin(n.seed+now/1500)*2.5;y+=Math.cos(n.seed+now/1700)*2.5;}}
  return[x,y];
}
const locksAt=(n,t)=>t<B0?0:t<M0?clamp(Math.floor(((t-B0)/(M0-B0)-0.05)*3.6),0,3):3;

const CAPS=[['Partner space','Three companies, three private sets of clues. Nothing has been shared yet.'],
  ['OPRF tokenization','Each raw clue becomes an opaque token — keyed, one-way, never reversible to a customer.'],
  ['Blinding','Every token is locked with each party’s secret key. Order doesn’t matter — like mixing paint.'],
  ['Protected match','Identically-locked tokens converge. What’s shared resolves; everything else stays hidden.'],
  ['Sealed','One opaque campaign, a derived score, a proof hash. 0 raw records ever crossed the membrane.']];
const capAt=t=>t<TOK0?0:t<B0?1:t<M0?2:t<SEAL?3:4;
let start=0,lastCap=-1,raf=null;
function setCap(i){if(i===lastCap)return;lastCap=i;const cap=document.getElementById('cap');cap.classList.remove('show');setTimeout(()=>{document.getElementById('capStep').textContent=CAPS[i][0];document.getElementById('capLine').textContent=CAPS[i][1];cap.classList.add('show');},150);}

function render(now){
  const t=clamp((now-start)/1000,0,END);
  ctx.clearRect(0,0,W,H);
  // particle field
  for(let i=0;i<64;i++){const x=(i*137.5+now*0.006*(i%3+1))%W,y=(i*89.3+now*0.004*(i%4+1))%H;ctx.fillStyle=`rgba(120,140,180,${0.03+0.025*Math.sin(i+now/900)})`;ctx.fillRect(x,y,1.4,1.4);}
  // cipher-space plot grid
  ctx.strokeStyle='rgba(7,133,139,0.08)';ctx.lineWidth=1;
  for(let gx=cipher.x-W*0.21;gx<cipher.x+W*0.22;gx+=44){ctx.beginPath();ctx.moveTo(gx,cipher.y-H*0.33);ctx.lineTo(gx,cipher.y+H*0.31);ctx.stroke();}
  for(let gy=cipher.y-H*0.31;gy<cipher.y+H*0.32;gy+=44){ctx.beginPath();ctx.moveTo(cipher.x-W*0.21,gy);ctx.lineTo(cipher.x+W*0.22,gy);ctx.stroke();}
  // membrane
  const g=ctx.createLinearGradient(mem-12,0,mem+12,0);g.addColorStop(0,'rgba(7,133,139,0)');g.addColorStop(.5,'rgba(7,133,139,.46)');g.addColorStop(1,'rgba(53,224,212,0)');
  ctx.fillStyle=g;ctx.fillRect(mem-9,H*0.10,18,H*0.80);
  ctx.strokeStyle='rgba(7,133,139,.40)';for(let y=H*0.12;y<H*0.90;y+=20){ctx.beginPath();ctx.moveTo(mem,y);ctx.lineTo(mem,y+9);ctx.stroke();}
  // zone labels
  ctx.font='10px "SF Mono",ui-monospace,monospace';ctx.fillStyle='rgba(82,105,116,.90)';ctx.textAlign='left';ctx.fillText('PARTNER SPACE',W*0.055,H-14);
  ctx.textAlign='center';ctx.fillText('MEMBRANE',mem,H-14);ctx.fillText('CIPHER SPACE · NEUTRAL PLANE',cipher.x,H-14);
  // party labels (fade as they leave)
  const plf=Math.max(0,1-Math.max(0,(t-B0))/1.5);
  if(plf>0){ctx.textAlign='center';ctx.fillStyle=`rgba(90,103,132,${.9*plf})`;homes.forEach((h,i)=>ctx.fillText(PARTY[i].n,h.x,h.y-42));}
  // constellation edges
  if(t>M0+2){const e=smooth((t-(M0+2))/1.2);ctx.strokeStyle=`rgba(255,77,109,${0.5*e})`;ctx.lineWidth=1.1;ctx.setLineDash([3,5]);ctx.lineDashOffset=-now/60;for(let i=0;i<4;i++)for(let j=i+1;j<4;j++){ctx.beginPath();ctx.moveTo(camp[i].x,camp[i].y);ctx.lineTo(camp[j].x,camp[j].y);ctx.stroke();}ctx.setLineDash([]);}
  // bloom at match
  const bl=(t-M0)/0.9;if(bl>0&&bl<1){const rr=bl*Math.min(W,H)*0.4,gg=ctx.createRadialGradient(cipher.x,cipher.y,0,cipher.x,cipher.y,rr);gg.addColorStop(0,`rgba(255,77,109,${0.32*(1-bl)})`);gg.addColorStop(1,'rgba(255,77,109,0)');ctx.fillStyle=gg;ctx.beginPath();ctx.arc(cipher.x,cipher.y,rr,0,7);ctx.fill();}

  let matched=0;
  for(const n of nodes){
    const[x,y]=pos(n,t,now), lk=locksAt(n,t);
    const noiseFade=(!n.campaign&&t>M0+0.7)?smooth((t-(M0+0.7))/1.4):0;
    const alpha=n.campaign?1:lerp(1,0.07,noiseFade);
    let col=t<TOK0?'#9fb0cc':(!n.campaign&&t>M0+0.7?C.faint:(t<M0?mixc(C.cyan,C.iris,lk/3):(n.campaign?C.crimson:C.faint)));
    if(n.campaign&&t>M0)matched=4;
    for(let i=0;i<lk;i++){const rr=n.size+5+i*4.2,rot=now/700*(i%2?-1:1)*(i+1)*0.5+n.seed;ctx.strokeStyle=`rgba(${n.campaign&&t>M0?'196,61,87':'89,100,207'},${0.45*alpha})`;ctx.lineWidth=1;ctx.beginPath();ctx.arc(x,y,rr,rot,rot+Math.PI*1.35);ctx.stroke();}
    ctx.save();ctx.globalAlpha=alpha;ctx.shadowColor=col;ctx.shadowBlur=(n.campaign?15:7)*alpha;ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,n.size,0,7);ctx.fill();ctx.restore();
  }
  // 4 clean labels at the constellation points
  if(t>M0+0.9){const la=smooth((t-(M0+0.9))/0.9);ctx.globalAlpha=la;ctx.fillStyle='rgba(153,43,66,.94)';ctx.font='10px "SF Mono",ui-monospace,monospace';for(let i=0;i<4;i++){const right=camp[i].x>=cipher.x;ctx.textAlign=right?'left':'right';ctx.fillText('0x'+campHex[i],camp[i].x+(right?11:-11),camp[i].y+3);}ctx.globalAlpha=1;}
  // sealed campaign
  if(t>=SEAL){const s=smooth((t-SEAL)/1.2);ctx.save();ctx.shadowColor=C.crimson;ctx.shadowBlur=24*s;ctx.strokeStyle=`rgba(255,77,109,${s})`;ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(cipher.x,cipher.y,Math.min(W,H)*0.205,0,7);ctx.stroke();ctx.restore();ctx.fillStyle=`rgba(255,179,193,${s})`;ctx.font='600 12px "SF Mono",ui-monospace,monospace';ctx.textAlign='center';ctx.fillText('CAMPAIGN '+CAMP_ID.slice(0,12)+'…',cipher.x,cipher.y+Math.min(W,H)*0.205+22);}

  document.getElementById('rEl').textContent=t<TOK1?Math.floor((t/TOK1)*nodes.length):nodes.length;
  document.getElementById('rMatch').textContent=matched;
  document.getElementById('prog').style.width=Math.min(100,(t/END)*100)+'%';
  setCap(capAt(t));
}
function loop(now){render(now);raf=requestAnimationFrame(loop);}
function run(){if(raf)cancelAnimationFrame(raf);build();start=reduce?performance.now()-END*1000:performance.now();raf=requestAnimationFrame(loop);}
document.getElementById('replay').onclick=run;
window.__seek=s=>{start=performance.now()-s*1000;render(performance.now());};
window.__dbg=()=>{const t=clamp((performance.now()-start)/1000,0,END);return{t:+t.toFixed(1),W:Math.round(W),n:nodes.slice(0,4).map(n=>{const[x]=pos(n,t,0);return{c:n.campaign,cid:n.cid,x:Math.round(x),fx:Math.round(n.fx)};})};};
resize();run();
</script>
</body>
</html>
